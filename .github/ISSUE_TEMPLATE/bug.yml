name: Bug report
description: Something decoded, serialized, generated, or compiled wrong.
labels: ["bug"]
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight
      options:
        - label: I searched existing issues for this bug.
          required: true
        - label: I can reproduce it on the latest published versions.
          required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you see, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: >-
        The smallest route definition + codec config + call that shows the
        problem. A failing URL or wire string is ideal — the
        [explorer](https://paramour.dev/explorer) can help isolate
        serialization issues.
      render: ts
    validations:
      required: true
  - type: textarea
    id: versions
    attributes:
      label: Versions
      description: >-
        Output of `npx paramour doctor`, or the versions of paramour,
        @paramour-js/*, next, node, and typescript.
      render: text
    validations:
      required: true
  - type: input
    id: validator
    attributes:
      label: Validator library
      description: zod / valibot / arktype / none — with version, if relevant.
