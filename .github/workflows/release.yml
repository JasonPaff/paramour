name: Release

on:
  push:
    branches: [main]

# One release run at a time, and never cancel a run that may be mid-publish.
concurrency:
  group: release
  cancel-in-progress: false

# No workflow-level permissions: each job declares exactly what it needs
# (zizmor: excessive-permissions), so the compat legs never see the release
# job's write/OIDC grants.
permissions: {}

jobs:
  # The compat matrix must also gate publishing (CI-B3): ci.yml never runs on
  # the Version Packages PR (PRs created with GITHUB_TOKEN don't trigger other
  # workflows), so this call is the only Next 15/16 compat check on the tree
  # that reaches npm. The compat legs only need to read the repo.
  next-compat:
    permissions:
      contents: read
    uses: ./.github/workflows/next-compat.yml

  release:
    name: Version PR / publish
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: next-compat
    permissions:
      contents: write # push the version branch, create tags and GitHub Releases
      pull-requests: write # open/update the "Version Packages" PR
      id-token: write # npm trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - uses: ./.github/actions/setup

      # OIDC trusted publishing requires npm >= 11.5.1; don't trust whatever
      # the runner's Node image happens to bundle.
      - run: npm install -g npm@^11

      # The full ci.yml `checks` gate. It must run again here because CI
      # never runs on the Version Packages PR: PRs created with GITHUB_TOKEN
      # don't trigger other workflows, so this plus the next-compat job above
      # are the only pre-publish checks. Running it in THIS job also leaves
      # the built dist/ in place for `changeset publish` below.
      - uses: ./.github/actions/checks

      # No NPM_TOKEN on purpose: auth is OIDC via the trusted publisher
      # registered on npmjs.com for both packages (repo JasonPaff/paramour,
      # workflow release.yml). If a scoped publish fails with a masked
      # "E404 ... PUT", see npm/cli#8976 before reaching for tokens.
      - uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          commit: "chore: release packages"
          publish: pnpm changeset publish
          title: "chore: release packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
