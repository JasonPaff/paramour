name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    name: Format, lint, typecheck, test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - uses: ./.github/actions/setup

      - uses: ./.github/actions/checks

  # DESIGN §12: "Next: latest two majors. Verified in CI matrix."
  #
  # Only `examples/next-compat` is version-sensitive. packages/next declares
  # `next` as a peer and stubs `next/navigation` in its unit tests, so `test`,
  # `test:types` and `test:types:registry` are Next-agnostic — running them per
  # leg would cost minutes and prove nothing. The compat package covers two
  # layers per leg: `typecheck` pins paramour's hand-written assumptions about
  # Next (the `next/navigation` ambient, the hardcoded phase strings,
  # RouteProps, the config-function shape) against a REAL Next, and
  # `build:gate` runs a REAL `next build` over a minimal app — the layer that
  # caught what types never can (Node ESM resolution of the externalized
  # package at "Collecting page data", and Next 15.5's generated `.next/types`
  # page-props check; see build-app/).
  #
  # `checks` above is the frozen-lockfile gate on the canonical 16.2.10.
  next-compat:
    name: Next ${{ matrix.next }} compat
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: checks
    strategy:
      fail-fast: false
      matrix:
        # Latest patch of each supported major. React is NOT swapped: 15.5.20
        # and 16.2.10 accept the same React peer range.
        next: ["15.5.20", "16.2.10"]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - uses: ./.github/actions/setup

      # The compat package resolves @paramour-js/next through its built dist.
      - run: pnpm build:packages

      # Reinstall the workspace packages as file: deps (hard COPIES inside
      # node_modules, packed now that dist/ exists — with the peer `next`
      # linked beside them in .pnpm). Through the default workspace SYMLINKS
      # the packages resolve outside node_modules and Next silently bundles
      # them, which is exactly the externalization gap that let the
      # extensionless `next/router` import build green while failing every
      # real Next 15 install — the copy topology makes `build:gate` see what
      # a real npm install sees. Runner-only mutation, like the Next swap
      # below.
      - run: pnpm --filter example-next-compat add "paramour@file:../../packages/core" "@paramour-js/next@file:../../packages/next"

      # Swap only this package's Next. Mutates the runner's package.json and
      # lockfile, never the repo; `checks` stays --frozen-lockfile, so genuine
      # lockfile drift is still caught there.
      - run: pnpm --filter example-next-compat add -D next@${{ matrix.next }}

      - run: pnpm --filter example-next-compat run typecheck

      - run: pnpm --filter example-next-compat run build:gate

  # Single stable context for branch protection: the ruleset requires "CI OK"
  # and nothing else, so renaming jobs or bumping the compat matrix's Next
  # versions never silently detaches a required check.
  ci-ok:
    name: CI OK
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [checks, next-compat]
    if: always()
    steps:
      - name: All jobs succeeded
        run: |
          if [ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped') }}" = "true" ]; then
            echo "One or more required jobs did not succeed:"
            echo "  checks: ${{ needs.checks.result }}"
            echo "  next-compat: ${{ needs.next-compat.result }}"
            exit 1
          fi
