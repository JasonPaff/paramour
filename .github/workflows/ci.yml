name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    name: Format, lint, typecheck, test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - uses: ./.github/actions/setup

      - uses: ./.github/actions/checks

  # The Next 15/16 compat matrix. Reusable workflow (CI-M2) shared with
  # release.yml so the compat gate also stands between main and npm (CI-B3);
  # all design rationale lives in next-compat.yml. `needs: checks` so matrix
  # minutes aren't burned on code that fails the cheap gate.
  next-compat:
    needs: checks
    uses: ./.github/workflows/next-compat.yml

  # Single stable context for branch protection: the ruleset requires "CI OK"
  # and nothing else, so renaming jobs or bumping the compat matrix's Next
  # versions never silently detaches a required check.
  ci-ok:
    name: CI OK
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [checks, next-compat]
    if: always()
    steps:
      - name: All jobs succeeded
        run: |
          if [ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped') }}" = "true" ]; then
            echo "One or more required jobs did not succeed:"
            echo "  checks: ${{ needs.checks.result }}"
            echo "  next-compat: ${{ needs.next-compat.result }}"
            exit 1
          fi
