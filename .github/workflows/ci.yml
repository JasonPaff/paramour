name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    name: Format, lint, typecheck, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        # version is read from the packageManager field in package.json

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm format:check
      # build before lint and typecheck: packages/next's type-checked source
      # and the examples resolve the packages' dist types, and pnpm's
      # topological order builds core → next → example-basic.
      - run: pnpm build
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm test:types
      - run: pnpm test:types:next
      - run: pnpm test:types:registry

  # DESIGN §12: "Next: latest two majors. Verified in CI matrix."
  #
  # Only `examples/next-compat` is version-sensitive. packages/next declares
  # `next` as a peer and stubs `next/navigation` in its unit tests, so `test`,
  # `test:types` and `test:types:registry` are Next-agnostic — running them per
  # leg would cost minutes and prove nothing. The compat package instead
  # typechecks paramour's hand-written assumptions about Next (the
  # `next/navigation` ambient, the hardcoded phase strings, RouteProps, the
  # config-function shape) against a REAL Next. Seconds per leg, no `next build`.
  #
  # `checks` above is the frozen-lockfile gate on the canonical 16.2.10.
  next-compat:
    name: Next ${{ matrix.next }} compat
    runs-on: ubuntu-latest
    needs: checks
    strategy:
      fail-fast: false
      matrix:
        # Latest patch of each supported major. React is NOT swapped: 15.5.20
        # and 16.2.10 accept the same React peer range.
        next: ["15.5.20", "16.2.10"]
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # The compat package resolves @paramour-js/next through its built dist.
      - run: pnpm build:packages

      # Swap only this package's Next. Mutates the runner's package.json and
      # lockfile, never the repo; `checks` stays --frozen-lockfile, so genuine
      # lockfile drift is still caught there.
      - run: pnpm --filter example-next-compat add -D next@${{ matrix.next }}

      - run: pnpm --filter example-next-compat run typecheck
