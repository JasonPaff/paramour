name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    name: Format, lint, typecheck, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        # version is read from the packageManager field in package.json

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm format:check
      # build before lint and typecheck: packages/next's type-checked source
      # and the examples resolve the packages' dist types, and pnpm's
      # topological order builds core → next → example-basic.
      - run: pnpm build
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm test:types
      - run: pnpm test:types:registry
