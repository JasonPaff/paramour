name: Link check

# Deliberately not part of ci.yml: external-host flakes must never block the
# required "CI OK" context. Two guards: the sources job checks absolute URLs
# in markdown/MDX on PRs, and the live-site job walks the deployed site's
# sitemap weekly so rendered internal links (including Fumadocs-resolved
# relative MDX links) are validated where they actually exist.
on:
  pull_request:
    paths:
      - ".github/**/*.md"
      - "README.md"
      - "docs/README.md"
      - "docs/content/**"
      - "packages/**/README.md"
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sources:
    name: sources
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      # Absolute self-site docs URLs (package READMEs must use them — they
      # render on npm) are remapped into the content tree: a page added in
      # the same PR that links it would 404 on the live site until merge.
      # The live-site job still checks them as deployed. The \$1 escape
      # survives the action's eval so lychee receives the $1 backreference.
      - uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2.9.0
        with:
          args: >-
            --config lychee.toml
            --root-dir "$GITHUB_WORKSPACE/docs/content"
            --remap "https://paramour\.dev/docs/(.*) file://$GITHUB_WORKSPACE/docs/content/docs/\$1"
            --no-progress
            README.md
            docs/README.md
            "docs/content/**/*.mdx"
            "packages/*/README.md"
          fail: true
        env:
          # Authenticated requests avoid github.com rate-limit flakes.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  live-site:
    name: live site
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      - name: Collect deployed pages from the sitemap
        run: |
          curl --fail --silent https://paramour.dev/sitemap.xml |
            grep --only-matching --perl-regexp '(?<=<loc>)[^<]+' > live-urls.txt
          wc -l live-urls.txt

      - uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2.9.0
        with:
          args: >-
            --config lychee.toml
            --no-progress
            live-urls.txt
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
