name: Checks
description: The full check gate — format, build, lint, typecheck, tests. Shared by ci.yml and release.yml so the two can never drift.

runs:
  using: composite
  steps:
    - run: pnpm format:check
      shell: bash

    # build before lint and typecheck: packages/next's type-checked source
    # and the examples resolve the packages' dist types, and pnpm's
    # topological order builds core → next → example-basic.
    - run: pnpm build
      shell: bash

    # examples/next-compat consumes the workspace packages as INJECTED
    # (hard-copied) deps, so Next's default externals treatment matches a
    # real install (see its build-app/next.config.ts). Injected copies are
    # materialized at install time — before dist/ existed — and hard links
    # don't grow new files, so re-install once after the build to sync the
    # copies; lint/typecheck below resolve dist types through them.
    - run: pnpm install --frozen-lockfile
      shell: bash

    - run: pnpm lint
      shell: bash

    - run: pnpm typecheck
      shell: bash

    # Negative suite: examples/type-errors must fail tsc with EXACTLY its
    # expected diagnostics (and stay codegen-drift-free). It defines no
    # build/typecheck scripts, so the recursive gates above never sweep it.
    - run: pnpm --filter example-type-errors run check
      shell: bash

    - run: pnpm test
      shell: bash

    - run: pnpm test:types
      shell: bash

    - run: pnpm test:types:devtools
      shell: bash

    - run: pnpm test:types:next
      shell: bash

    - run: pnpm test:types:nuqs
      shell: bash

    - run: pnpm test:types:registry
      shell: bash
